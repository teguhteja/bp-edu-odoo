server {
    listen 80;

    # Use Podman's internal aardvark-dns resolver, re-resolve every 30s
    # Prevents 502 after container restarts (avoids stale IP cache)
    resolver 10.89.7.1 valid=30s ipv6=off;

    location /websocket {
        set $odoo_upstream http://web:8072;
        proxy_pass $odoo_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        set $odoo_upstream http://web:8069;
        proxy_pass $odoo_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
